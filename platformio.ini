; Solis ESP32-C3 LED 露营车尾灯固件
; 主控: ESP32-C3 SuperMini (4MB flash, USB-CDC)
; 灯条: WS2812B x6 @ GPIO3

[env:esp32-c3-supermini]
platform = espressif32@6.13.0
board = esp32-c3-devkitm-1
framework = arduino

; --- 串口 / 烧录 ---
upload_port = COM6
monitor_port = COM6
monitor_speed = 115200

; C3 SuperMini 走原生 USB-CDC, 必须开下面两个否则串口看不到日志
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- 文件系统 (Web 页面存这里) + OTA 分区 ---
; default.csv 自带 app0/app1 双 OTA 槽 + spiffs 数据区
board_build.partitions = default.csv
board_build.filesystem = littlefs

lib_deps =
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/AsyncTCP@^3.2.0
    mathieucarbou/ESPAsyncWebServer@^3.3.0

; 无线烧录环境: pio run -e ota -t upload
; 设备连上局域网后, 通过 solis.local 走 espota 上传, 不用插 USB
[env:ota]
extends = env:esp32-c3-supermini
upload_protocol = espota
upload_port = solis-taillight.local
